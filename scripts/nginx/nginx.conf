events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    types {
        text/csv csv;
    }

    server {
        listen 8000;
        server_name _;

        root /usr/share/nginx/html;

        location / {
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            charset utf-8;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }
    }
}
