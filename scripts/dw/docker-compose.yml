services:
  dw:
    container_name: dw-greenplum
    image: woblerr/greenplum:7.1.0-v0.8
    ports:
      - 5432:5432
    environment:
      - GREENPLUM_PASSWORD=semis2_grupo11
      - GPDATA_PASSWORD=semis2_grupo11
    volumes:
      - dw_data:/var/lib/postgresql/data
      - ./init.sql:/init.sql
    networks:
      - mortality-net

volumes:
  dw_data:

networks:
  mortality-net:
    external: true
